name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

# cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        # runs tsc --noEmit && vite build; a Supabase URL isn't required —
        # the app falls back to demo mode when the env vars are absent.
        run: npm run build

  # RLS isolation tests run only when a test Supabase project is configured
  # (secrets present). They never run on forks. See supabase/tests/README.md.
  rls:
    name: RLS isolation tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run RLS tests (skipped if secrets absent)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_TEST_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "No test Supabase project configured — skipping RLS tests."
            exit 0
          fi
          node supabase/tests/rls.test.mjs
